! ============================================================================
! georoute / FRR integration snippet
!
! This is *not* a complete frr.conf. Splice it into your existing
! configuration alongside your `router bgp` stanza. The pieces:
!
!   1. A community-list to tag locally originated country prefixes.
!   2. A route-map that sets that community on the network statements.
!   3. Marker comments INSIDE the address-family blocks — georoute looks for
!      these exactly and replaces everything between them.
!   4. An outbound route-map on the upstream peer that lets the tagged
!      community out (RFC 8212 requires explicit permits).
! ============================================================================

bgp community-list standard CL-RU-EXIT seq 5 permit 64512:201
!
route-map MARK-RU-EXIT permit 10
 set community 64512:201 additive
exit
!
router bgp <YOUR-ASN>
 ! ... your existing config ...
 !
 address-family ipv4 unicast
  ! locally-originated prefixes that should stay yours
  network 10.253.4.0/24
  network 192.0.2.4/32
  !
  ! Markers — georoute replaces lines between these on each run.
  ! Indent matters (two spaces) — same as the surrounding lines.
  ! BEGIN-RU-FEED-V4
  ! END-RU-FEED-V4
  !
  neighbor <upstream-peer> activate
  neighbor <upstream-peer> route-map FROM-PEER in
  neighbor <upstream-peer> route-map TO-PEER  out
 exit-address-family
 !
 address-family ipv6 unicast
  network fdf3:bb42:9fc6:4::/64
  network fdf3:bb42:9fc6:ff00::4/128
  !
  ! BEGIN-RU-FEED-V6
  ! END-RU-FEED-V6
  !
  neighbor <upstream-peer-v6> activate
  neighbor <upstream-peer-v6> route-map V6-FROM-PEER in
  neighbor <upstream-peer-v6> route-map V6-TO-PEER  out
 exit-address-family
exit
!
! Allow the tagged community to leave on the upstream peer.
! Keep prefix-list TO-PEER for your own local prefixes too.
!
route-map TO-PEER permit 10
 match ip address prefix-list TO-PEER-LOCAL
exit
route-map TO-PEER permit 20
 match community CL-RU-EXIT
exit
route-map TO-PEER deny 999
exit
